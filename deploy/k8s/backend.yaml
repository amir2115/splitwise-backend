apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: splitwise
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: splitwise/backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: splitwise-config
            - secretRef:
                name: splitwise-runtime-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: splitwise-runtime-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: uploaded-files
              mountPath: /files
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: uploaded-files
          hostPath:
            path: /opt/offline-splitwise/k8s-data/files
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: splitwise
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
