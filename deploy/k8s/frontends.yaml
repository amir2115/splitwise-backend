apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: splitwise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      containers:
        - name: landing
          image: splitwise/landing:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: splitwise
spec:
  selector:
    app: landing
  ports:
    - name: http
      port: 80
      targetPort: http
---
