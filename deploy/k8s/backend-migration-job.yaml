apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: splitwise
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: alembic
          image: splitwise/backend:local
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: splitwise-config
            - secretRef:
                name: splitwise-runtime-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: splitwise-runtime-secret
                  key: DATABASE_URL
