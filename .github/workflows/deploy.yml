name: Test and deploy backend stack

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-stack-deploy
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements.txt
        env:
          PIP_INDEX_URL: ${{ vars.PIP_INDEX_URL || 'https://mirror-pypi.runflare.com/simple' }}
          PIP_EXTRA_INDEX_URL: ${{ vars.PIP_EXTRA_INDEX_URL }}
          PIP_TRUSTED_HOST: ${{ vars.PIP_TRUSTED_HOST }}
      - run: python -m pytest tests
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-admin-panel:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: admin-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        env:
          NPM_CONFIG_REGISTRY: ${{ vars.NPM_CONFIG_REGISTRY || 'https://mirror-npm.runflare.com/' }}
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.splitwise.ir/api/v1' }}

  deploy:
    needs: [test-backend, test-admin-panel]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Debug runner state
        run: |
          echo "===== WHOAMI ====="
          whoami
      
          echo "===== PWD ====="
          pwd
      
          echo "===== FILES ====="
          ls -la
      
          echo "===== GITHUB_WORKSPACE ====="
          echo "$GITHUB_WORKSPACE"
      
          echo "===== WORKSPACE FILES ====="
          ls -la "$GITHUB_WORKSPACE"
      
          echo "===== FIND DOCKERFILES ====="
          find "$GITHUB_WORKSPACE" -name Dockerfile
      
          echo "===== DISK ====="
          df -h
      
          echo "===== DOCKER ====="
          docker version
      
      - name: Build backend image
        env:
          APT_MIRROR: ${{ vars.APT_MIRROR || 'http://mirror-linux.runflare.com/debian' }}
          APT_SECURITY_MIRROR: ${{ vars.APT_SECURITY_MIRROR || 'http://mirror-linux.runflare.com/debian-security' }}
          PIP_INDEX_URL: ${{ vars.PIP_INDEX_URL || 'https://mirror-pypi.runflare.com/simple' }}
          PIP_EXTRA_INDEX_URL: ${{ vars.PIP_EXTRA_INDEX_URL }}
          PIP_TRUSTED_HOST: ${{ vars.PIP_TRUSTED_HOST }}
        run: |
          cd "$GITHUB_WORKSPACE"
      
          docker build \
            --progress=plain \
            --build-arg APT_MIRROR="$APT_MIRROR" \
            --build-arg APT_SECURITY_MIRROR="$APT_SECURITY_MIRROR" \
            --build-arg PIP_INDEX_URL="$PIP_INDEX_URL" \
            --build-arg PIP_EXTRA_INDEX_URL="$PIP_EXTRA_INDEX_URL" \
            --build-arg PIP_TRUSTED_HOST="$PIP_TRUSTED_HOST" \
            -t splitwise/backend:local \
            -f Dockerfile \
            .

      - name: Build admin panel image
        env:
          NPM_CONFIG_REGISTRY: ${{ vars.NPM_CONFIG_REGISTRY || 'https://mirror-npm.runflare.com/' }}
        run: |
          cd "$GITHUB_WORKSPACE"

          docker build \
            --progress=plain \
            --build-arg NPM_CONFIG_REGISTRY="$NPM_CONFIG_REGISTRY" \
            -t splitwise/admin-panel:local \
            ./admin-panel

      - name: Import images into k3s
        run: |
          docker save splitwise/backend:local | sudo k3s ctr images import -
          docker save splitwise/admin-panel:local | sudo k3s ctr images import -

      - name: Verify imported images
        run: |
          sudo k3s ctr images ls | grep splitwise

      - name: Deploy mail services
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          cd "$DEPLOY_ROOT"

          docker compose --env-file .env.production up -d mailserver roundcube

      - name: Apply Kubernetes manifests
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          cd "$DEPLOY_ROOT"

          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/configmap.yaml
          kubectl create secret generic splitwise-runtime-secret \
            --namespace splitwise \
            --from-env-file .env \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          kubectl apply -f deploy/k8s/postgres.yaml
          kubectl apply -f deploy/k8s/backend.yaml
          kubectl apply -f deploy/k8s/frontends.yaml
          kubectl apply -f deploy/k8s/mail.yaml
          kubectl apply -f deploy/k8s/postgres-backup.yaml

      - name: Run database migrations
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          set -euo pipefail

          cd "$DEPLOY_ROOT"

          kubectl delete job backend-migration \
            -n splitwise \
            --ignore-not-found

          kubectl apply -f deploy/k8s/backend-migration-job.yaml

          kubectl wait \
            --for=condition=complete \
            job/backend-migration \
            -n splitwise \
            --timeout=180s || {
              echo "===== MIGRATION LOGS ====="
              kubectl logs job/backend-migration -n splitwise
              exit 1
            }

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/backend -n splitwise
          kubectl rollout restart deployment/admin-panel -n splitwise
          kubectl rollout restart deployment/mailserver -n splitwise
          kubectl rollout restart deployment/roundcube -n splitwise

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n splitwise --timeout=180s
          kubectl rollout status deployment/admin-panel -n splitwise --timeout=180s
          kubectl rollout status deployment/roundcube -n splitwise --timeout=180s

      - name: Cleanup Docker build cache
        if: always()
        timeout-minutes: 3
        run: |
          set +e

          echo "===== DISK BEFORE CLEANUP ====="
          df -h / /mnt/data || true

          timeout 90s docker builder prune -af --filter "until=24h" || true
          timeout 90s docker image prune -af --filter "until=24h" || true
          timeout 30s docker container prune -f || true

          echo "===== DISK AFTER CLEANUP ====="
          df -h / /mnt/data || true
      
