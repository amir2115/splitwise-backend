name: Test and deploy backend stack

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-stack-deploy
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest tests
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-admin-panel:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: admin-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.splitwise.ir/api/v1' }}

  deploy:
    needs: [test-backend, test-admin-panel]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: |
          docker build \ 
            -t splitwise/backend:local \
            .

      - name: Build admin panel image
        run: |
          docker build \ 
            -t splitwise/admin-panel:local \
            ./admin-panel

      - name: Import images into k3s
        run: |
          docker save splitwise/backend:local | k3s ctr images import -
          docker save splitwise/admin-panel:local | k3s ctr images import -

      - name: Deploy mail services
        env: 
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          cd "$DEPLOY_ROOT"
          
          docker compose --env-file .env.production up -d mailserver roundcube

      - name: Apply Kubernetes manifests
        env: 
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          cd "$DEPLOY_ROOT"
          
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/configmap.yaml
          kubectl apply -f deploy/k8s/secrets.yaml

          kubectl apply -f deploy/k8s/postgres.yaml
          kubectl apply -f deploy/k8s/backend.yaml
          kubectl apply -f deploy/k8s/frontends.yaml
          kubectl apply -f deploy/k8s/mail.yaml
          kubectl apply -f deploy/k8s/postgres-backup.yaml

      - name: Run database migrations
        env: 
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          cd "$DEPLOY_ROOT"
          
          kubectl delete job backend-migration \
            -n splitwise \
            --ignore-not-found

          kubectl apply -f deploy/k8s/backend-migration-job.yaml
          
          kubectl wait \
            --for=condition=complete \
            job/backend-migration \
            -n splitwise \
            --timeout=180s

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/backend -n splitwise
          kubectl rollout restart deployment/admin-panel -n splitwise

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n splitwise --timeout=180s
          kubectl rollout status deployment/admin-panel -n splitwise --timeout=180s
      
