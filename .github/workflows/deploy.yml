name: Test and deploy backend stack

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-stack-deploy
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest tests
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-admin-panel:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: admin-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.splitwise.ir/api/v1' }}

  deploy:
    needs: [test-backend, test-admin-panel]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy changed services
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_ROOT"
          git fetch origin main
          git reset --hard origin/main

          flock /tmp/splitwise-deploy.lock bash -s <<'DEPLOY'
          set -euo pipefail
          docker compose --env-file .env.production up -d --build backend admin-panel
          docker compose --env-file .env.production up -d --no-deps nginx
          docker compose --env-file .env.production exec -T backend alembic upgrade head
          DEPLOY
          REMOTE
